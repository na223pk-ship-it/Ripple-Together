<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ripple Experience</title>
  <style>
    :root {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-text: #cdccca;
      --color-primary: #4f98a3;
      --radius-full: 9999px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, color-mix(in oklab, var(--color-primary) 18%, transparent), transparent 32%),
        radial-gradient(circle at 80% 30%, color-mix(in oklab, var(--color-primary) 10%, transparent), transparent 30%),
        linear-gradient(180deg, color-mix(in oklab, var(--color-bg) 82%, black), var(--color-bg));
      cursor: none;
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }
    main, #stage, .grid, .ripple-layer, .cursor-layer { position: fixed; inset: 0; }
    .grid {
      background-image:
        linear-gradient(color-mix(in oklab, white 0.08%, transparent) 1px, transparent 1px),
        linear-gradient(90deg, color-mix(in oklab, white 0.08%, transparent) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 100%);
      opacity: 0.42;
    }
    .cursor {
      position: absolute; width: 22px; height: 22px; margin-left: -11px; margin-top: -11px;
      border-radius: 50%; pointer-events: none; transform: translate3d(0,0,0);
      border: 1px solid color-mix(in oklab, white 50%, transparent);
      box-shadow: 0 0 0 1px color-mix(in oklab, black 16%, transparent), 0 0 30px var(--cursor-color);
      background: radial-gradient(circle at 35% 35%, white, color-mix(in oklab, var(--cursor-color) 75%, white) 28%, var(--cursor-color) 70%);
      transition: transform 60ms linear;
    }
    .cursor::after { content: ''; }
    .cursor.self { width: 18px; height: 18px; margin-left: -9px; margin-top: -9px; }
    .ripple {
      position: absolute; left: 0; top: 0; width: var(--size); height: var(--size);
      margin-left: calc(var(--size) / -2); margin-top: calc(var(--size) / -2);
      border-radius: 50%; pointer-events: none;
      border: 1.5px solid color-mix(in oklab, var(--ripple-color) 72%, white 8%);
      box-shadow: 0 0 40px color-mix(in oklab, var(--ripple-color) 28%, transparent), inset 0 0 40px color-mix(in oklab, var(--ripple-color) 14%, transparent);
      background: radial-gradient(circle, color-mix(in oklab, var(--ripple-color) 22%, transparent) 0%, transparent 58%);
      transform: translate3d(var(--x), var(--y), 0) scale(var(--scale));
      opacity: var(--opacity);
      transition: transform 90ms linear, opacity 180ms linear;
      mix-blend-mode: screen;
    }
    @media (prefers-reduced-motion: reduce) {
      .cursor, .ripple { transition: none !important; }
    }
  </style>
</head>
<body>
  <main aria-label="Interactive ripple experience">
    <span class="sr-only">Move the pointer to create ripple motion.</span>
    <section id="stage" aria-hidden="true">
      <div class="grid"></div>
      <div class="ripple-layer" id="rippleLayer"></div>
      <div class="cursor-layer" id="cursorLayer"></div>
    </section>
  </main>

  <script>
    const rippleLayer = document.getElementById('rippleLayer');
    const cursorLayer = document.getElementById('cursorLayer');

    const palette = ['#4f98a3', '#e8af34', '#d163a7', '#6daa45', '#5591c7', '#fdab43', '#a86fdf'];
    const clientId = Math.random().toString(36).slice(2, 10);
    const color = palette[Math.floor(Math.random() * palette.length)];
    const channel = 'BroadcastChannel' in window ? new BroadcastChannel('ripple-presence-room') : null;

    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2, vx: 0, vy: 0 };
    let lastSent = 0;
    let lastRippleAt = 0;
    let frame = 0;

    const selfState = { id: clientId, color, x: mouse.x, y: mouse.y, lastSeen: performance.now(), pulse: 0 };
    const peers = new Map([[clientId, selfState]]);
    const ripples = [];

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function makeCursor(peer, isSelf = false) {
      const el = document.createElement('div');
      el.className = `cursor${isSelf ? ' self' : ''}`;
      el.style.setProperty('--cursor-color', peer.color);
      cursorLayer.appendChild(el);
      peer.el = el;
      return el;
    }

    function ensurePeer(peer) {
      if (!peer.el) makeCursor(peer, peer.id === clientId);
      return peer.el;
    }

    function spawnRipple(x, y, sourceColor, energy = 1, sourceId = 'system') {
      const el = document.createElement('div');
      el.className = 'ripple';
      const baseSize = 44 + energy * 26;
      el.style.setProperty('--size', `${baseSize}px`);
      el.style.setProperty('--x', `${x}px`);
      el.style.setProperty('--y', `${y}px`);
      el.style.setProperty('--scale', 0.25);
      el.style.setProperty('--opacity', 0.85);
      el.style.setProperty('--ripple-color', sourceColor);
      rippleLayer.appendChild(el);
      ripples.push({ x, y, born: performance.now(), life: 1800 + energy * 500, color: sourceColor, energy, el, sourceId, harmony: 0, driftX: 0, driftY: 0, pairScale: 0 });
    }

    function broadcast(payload) {
      if (channel) channel.postMessage(payload);
    }

    function publishState(forceRipple = false) {
      const now = performance.now();
      if (!forceRipple && now - lastSent < 24) return;
      lastSent = now;
      selfState.x = mouse.x;
      selfState.y = mouse.y;
      selfState.lastSeen = now;
      broadcast({ type: 'presence', peer: { id: clientId, x: mouse.x, y: mouse.y, color, lastSeen: Date.now() } });
      if (forceRipple || now - lastRippleAt > 150) {
        lastRippleAt = now;
        broadcast({ type: 'pulse', peerId: clientId, x: mouse.x, y: mouse.y, color, energy: clamp(Math.hypot(mouse.vx, mouse.vy) / 22, 0.35, 2.4) });
        spawnRipple(mouse.x, mouse.y, color, clamp(Math.hypot(mouse.vx, mouse.vy) / 22, 0.4, 2.2), clientId);
      }
    }

    function mergePeer(data) {
      if (!data || data.id === clientId) return;
      const peer = peers.get(data.id) || { id: data.id, pulse: 0 };
      peer.x = data.x;
      peer.y = data.y;
      peer.color = data.color || '#4f98a3';
      peer.lastSeen = performance.now();
      peers.set(data.id, peer);
      ensurePeer(peer);
    }

    function handleMessage(payload) {
      if (!payload || payload.peerId === clientId || payload.peer?.id === clientId) return;
      if (payload.type === 'presence') mergePeer(payload.peer);
      if (payload.type === 'pulse') {
        const peer = peers.get(payload.peerId);
        if (peer) peer.pulse = 1;
        spawnRipple(payload.x, payload.y, payload.color || peer?.color || '#4f98a3', payload.energy || 1, payload.peerId);
      }
      if (payload.type === 'leave' && peers.has(payload.peerId)) {
        const peer = peers.get(payload.peerId);
        if (peer.el) peer.el.remove();
        peers.delete(payload.peerId);
      }
    }

    if (channel) {
      channel.onmessage = (event) => handleMessage(event.data);
      window.addEventListener('beforeunload', () => channel.postMessage({ type: 'leave', peerId: clientId }));
    }

    window.addEventListener('pointermove', (event) => {
      const prev = { x: mouse.x, y: mouse.y };
      mouse.x = event.clientX;
      mouse.y = event.clientY;
      mouse.vx = mouse.x - prev.x;
      mouse.vy = mouse.y - prev.y;
      publishState(false);
    }, { passive: true });

    window.addEventListener('pointerdown', (event) => {
      mouse.x = event.clientX;
      mouse.y = event.clientY;
      mouse.vx = 0;
      mouse.vy = 0;
      publishState(true);
    });

    function updateRipples(now) {
      for (let i = ripples.length - 1; i >= 0; i -= 1) {
        const ripple = ripples[i];
        const age = now - ripple.born;
        const t = age / ripple.life;
        if (t >= 1) {
          ripple.el.remove();
          ripples.splice(i, 1);
          continue;
        }
        let interactionBoost = 0;
        let harmony = 0;
        let driftX = 0;
        let driftY = 0;
        let pairScale = 0;
        for (const other of ripples) {
          if (other === ripple) continue;
          const dx = other.x - ripple.x;
          const dy = other.y - ripple.y;
          const distance = Math.hypot(dx, dy);
          const threshold = 140 + (ripple.energy + other.energy) * 45;
          if (distance < threshold) {
            const closeness = 1 - distance / threshold;
            const sharedPhase = Math.sin((age + (now - other.born)) * 0.0065);
            interactionBoost += closeness * 0.12;
            if (ripple.sourceId !== other.sourceId) {
              harmony += closeness;
              driftX += dx * closeness * 0.035;
              driftY += dy * closeness * 0.035;
              pairScale += sharedPhase * closeness * 0.18;
            }
          }
        }
        ripple.harmony += (harmony - ripple.harmony) * 0.08;
        ripple.driftX += (driftX - ripple.driftX) * 0.08;
        ripple.driftY += (driftY - ripple.driftY) * 0.08;
        ripple.pairScale += (pairScale - ripple.pairScale) * 0.08;
        const harmonicLift = ripple.harmony * 0.14;
        const scale = 0.25 + t * (3.15 + ripple.energy * 0.48) + interactionBoost + ripple.pairScale;
        const opacity = Math.max(0, 0.82 - t * 0.82 + harmonicLift * 0.22);
        const blend = Math.min(42, ripple.harmony * 18);
        ripple.el.style.setProperty('--scale', scale.toFixed(3));
        ripple.el.style.setProperty('--x', `${(ripple.x + ripple.driftX).toFixed(2)}px`);
        ripple.el.style.setProperty('--y', `${(ripple.y + ripple.driftY).toFixed(2)}px`);
        ripple.el.style.setProperty('--opacity', opacity.toFixed(3));
        ripple.el.style.borderWidth = `${1.2 + harmonicLift * 0.9}px`;
        ripple.el.style.background = `radial-gradient(circle, color-mix(in oklab, ${ripple.color} ${22 + blend}%, transparent) 0%, transparent 60%)`;
      }
    }

    function cleanupPeers(now) {
      for (const [id, peer] of peers.entries()) {
        if (id === clientId) continue;
        if (now - peer.lastSeen > 5000) {
          if (peer.el) peer.el.remove();
          peers.delete(id);
        }
      }
    }

    function render(now) {
      frame += 1;
      selfState.lastSeen = now;
      ensurePeer(selfState);
      selfState.el.style.transform = `translate3d(${selfState.x}px, ${selfState.y}px, 0) scale(1)`;

      for (const peer of peers.values()) {
        const el = ensurePeer(peer);
        const pulse = peer.pulse || 0;
        el.style.setProperty('--cursor-color', peer.color || color);
        el.style.transform = `translate3d(${peer.x || 0}px, ${peer.y || 0}px, 0) scale(${1 + pulse * 0.5})`;
        peer.pulse = Math.max(0, pulse - 0.04);
      }

      updateRipples(now);
      if (frame % 120 === 0) cleanupPeers(now);
      requestAnimationFrame(render);
    }

    spawnRipple(mouse.x, mouse.y, color, 1.8, clientId);
    publishState(true);
    requestAnimationFrame(render);
  </script>
</body>
</html>
